<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plan</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <!-- Contenitore principale -->
    <main class="pricing-section">
        <div class="top-bar">
            <!-- Heading -->
            <div class="heading">
                <h1>Our Pricing Plan</h1>
                <p>We are an industry-leading company that values honesty, integrity and
                    efficiency, building quality products.
                </p>
            </div>
        </div>

        <!-- Toggle per il tipo di abbonamento -->
        <div class="type-subscription-toggle">
            <span>Monthly</span>
            <div class="toggle-switch"></div>

            <span>Yearly</span>
            <div class="toggle-switch-off"></div>
        </div>

        <!-- Contenitore delle card dei piani -->
         <div class="plans">

         </div>
    </main>

</body>
</html>
